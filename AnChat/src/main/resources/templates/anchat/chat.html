<html xmlns:th="http://www.thymeleaf.org">

<style>
    /* 自定义样式 */
    .chat-container {
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
        border: 1px solid #ddd;
        border-radius: 5px;
        background-color: #f9f9f9;
    }

    .chat-history {
        height: 100%;
        overflow: auto;
        border: 1px solid #ddd;
        border-radius: 5px;
        padding: 10px;
        margin-bottom: 10px;
        background-color: #fff;
    }

    .chat-message {
        margin-bottom: 20px; /* 增加间隙 */
        clear: both; /* 清除浮动，避免消息重叠 */
    }

    .chat-message::after {
        content: "";
        display: table;
        clear: both;
    }

    .chat-message .message-text {
        padding: 8px 12px;
        border-radius: 5px;
        display: inline-block;
        max-width: 80%;
    }

    .chat-message.user .message-text {
        background-color: #007bff;
        color: #fff;
        float: right;
    }

    .chat-message.bot .message-text {
        background-color: #f1f1f1;
        color: #333;
        float: left;
    }

    /* 加载中 spinner 样式 */
    .loading-spinner {
        border: 4px solid #f3f3f3; /* 浅灰色边框 */
        border-top: 4px solid #3498db; /* 蓝色顶部边框 */
        border-radius: 50%;
        width: 20px;
        height: 20px;
        animation: spin 1s linear infinite;
        display: inline-block;
        vertical-align: middle;
    }

    @keyframes spin {
        0% {
            transform: rotate(0deg);
        }
        100% {
            transform: rotate(360deg);
        }
    }


</style>

    function chat() {
        let content = $("#ai-input-content").val();
        if (content === undefined) {
            content = '';
        }
        if (content.trim() !== "") {
            addChat(content, "user");
        }
        let formData = new FormData();
        let id = $("#chat-id").val();
        if (id === undefined) {
            id = '';
        }
        formData.append("content", content);
        formData.append("id", id);
        formData.append("modelId", '1');
        // 在发送 AJAX 请求前，添加加载中的 bot 消息
        var loadingMessage = addLoadingBotMessage();
        $.ajax({
            type: "post",
            url: basePath + '/anChat/chat',
            data: formData,
            processData: false,
            timeout: 100000, // 设置超时时间为30秒
            contentType: false,
            success: function (data) {
                loadingMessage.remove();
                if (data.success) {
                    let result = data.object.content;
                    addChat(result, "system");
                    $("#chat-id").val(data.object.id);
                    $("#ai-input-content").val("")
                    scrollToBottom();
                } else {
                    addChat("请求出错", "system");
                }
            }
        })
    }
    function sendMessage(str){
        $("#temp-message").append(str);
    }
    function scrollToBottom() {
        let thisEle = $("#chat-history");
        thisEle.scrollTop(thisEle[0].scrollHeight);
    }

    function addLoadingBotMessage() {
        var loadingHtml = '<div class="chat-message bot" id="loading-message">' +
            '  <div class="message-text" >' +
            '    <span class="loading-spinner"></span>' +
            '    <span style="margin-left: 5px;"></span>' +
            '  </div>' +
            '</div>';
        $("#chat-history").append(loadingHtml);

        return $("#loading-message");
