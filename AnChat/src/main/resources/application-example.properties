# ============================================================
# AnChat 本地配置模板（不含任何真实凭据，可安全提交）
# 使用方式：复制本文件为 application.properties，填入你本地的值。
# 真实 application.properties 已被 .gitignore 忽略，不会进入版本库。
# ============================================================

# —— 数据库（本地 MySQL；若后续改为安卓端，此项将废弃）——
spring.datasource.username=YOUR_DB_USER
spring.datasource.password=YOUR_DB_PASSWORD
#spring.datasource.driver-class-name= //spring-boot-starter-data-jdbc 未启用
spring.datasource.url=jdbc:mysql://<host>:<port>/<db>?serverTimezone=Asia/Shanghai
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Shanghai
spring.main.allow-bean-definition-overriding=true

server.port=7777
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
logging.level.org.hibernate.SQL=DEBUG
spring.web.resources.static-locations=classpath:/static/
config.ip=localhost

# Redis 配置（Token 持久化存储；本地可留 localhost）
spring.redis.host=localhost
spring.redis.port=6379
# spring.redis.password=
